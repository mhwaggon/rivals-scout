<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Get Help!</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark:#0a0e1a;--bg-card:#111828;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;
    --accent-red:#ef4444;--accent-gold:#fbbf24;--accent-green:#22c55e;
    --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
    --border:rgba(59,130,246,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Rajdhani',sans-serif;background:var(--bg-dark);color:var(--text-primary);min-height:100dvh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(59,130,246,0.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(6,182,212,0.06) 0%,transparent 60%)}

  .header{padding:14px 20px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);
    position:sticky;top:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);z-index:100}
  .logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;
    background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
  .season-select{margin-left:auto;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);
    border-radius:6px;padding:4px 8px;color:var(--accent-cyan);font-family:'Orbitron',sans-serif;
    font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;outline:none}
  .season-select option{background:var(--bg-dark);color:var(--text-primary)}

  .main{padding:12px 16px;max-width:480px;margin:0 auto}

  /* Photo reference - stays visible while typing */
  .photo-ref{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);
    margin-bottom:12px;display:none;max-height:35vh}
  .photo-ref.active{display:block}
  .photo-ref img{width:100%;display:block;object-fit:contain;max-height:35vh}
  .photo-ref .photo-actions{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  .photo-ref .photo-btn{background:rgba(0,0,0,0.6);border:none;color:white;width:28px;height:28px;
    border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .photo-ref .photo-btn svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2}

  /* Input area - always prominent */
  .input-area{display:flex;gap:8px;margin-bottom:12px}
  .name-input{flex:1;background:var(--bg-card);border:2px solid var(--border);border-radius:10px;padding:12px 16px;
    color:var(--text-primary);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:600;outline:none;
    transition:border-color 0.15s}
  .name-input:focus{border-color:var(--accent-blue)}
  .name-input::placeholder{color:var(--text-muted);font-weight:500}
  .add-btn{background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));border:none;border-radius:10px;
    padding:12px 20px;color:white;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;letter-spacing:0.5px}
  .add-btn:active{opacity:0.85;transform:scale(0.97)}

  .snap-btn{width:100%;padding:14px;border:2px dashed rgba(59,130,246,0.3);border-radius:10px;
    background:rgba(59,130,246,0.05);color:var(--text-secondary);font-family:'Rajdhani',sans-serif;
    font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:12px;transition:all 0.15s}
  .snap-btn:active{background:rgba(59,130,246,0.12);border-color:var(--accent-blue)}
  .snap-btn svg{width:20px;height:20px;stroke:var(--accent-cyan);fill:none}
  .snap-btn.has-photo{padding:10px;border-style:solid;border-color:rgba(59,130,246,0.2)}

  /* Player cards */
  .players-section{margin-top:8px}
  .players-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
  .players-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);letter-spacing:2px;text-transform:uppercase}
  .players-count{font-size:12px;color:var(--text-muted)}
  .clear-all{background:none;border:none;color:var(--accent-red);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:4px 8px}
  .player-list{display:flex;flex-direction:column;gap:6px}

  .player-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;
    display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;animation:slideUp 0.2s ease-out both}
  .player-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent-blue),var(--accent-cyan))}
  .player-index{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);width:16px;text-align:center;flex-shrink:0}
  .player-info{flex:1;min-width:0}
  .player-name{font-size:17px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-meta{font-size:11px;color:var(--text-muted);margin-top:1px}
  .player-name-edit{font-size:17px;font-weight:700;color:var(--text-primary);font-family:'Rajdhani',sans-serif;
    background:rgba(255,255,255,0.06);border:1px solid var(--accent-blue);border-radius:6px;padding:2px 8px;outline:none;width:100%}
  .player-actions{display:flex;align-items:center;gap:5px;flex-shrink:0}
  .player-btn{width:30px;height:30px;border:none;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .player-btn svg{width:14px;height:14px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .btn-edit{background:rgba(59,130,246,0.1)} .btn-edit svg{stroke:var(--accent-blue)}
  .btn-remove{background:rgba(239,68,68,0.1)} .btn-remove svg{stroke:var(--accent-red)}
  .btn-open{background:rgba(6,182,212,0.1);text-decoration:none;display:flex} .btn-open svg{stroke:var(--accent-cyan)}

  .lookup-all-btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:10px;
    background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));color:white;
    font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;display:none}
  .lookup-all-btn.visible{display:block}
  .lookup-all-btn:active{opacity:0.85;transform:scale(0.98)}

  .tip{margin-top:16px;padding:10px 14px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15);
    border-radius:8px;font-size:12px;color:var(--text-muted);line-height:1.4}
  .tip strong{color:var(--accent-gold)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg-card);
    border:1px solid var(--border);padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;
    color:var(--text-primary);transition:transform 0.3s ease;z-index:200;white-space:nowrap}
  .toast.visible{transform:translateX(-50%) translateY(0)}

  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .player-card:nth-child(1){animation-delay:.02s}.player-card:nth-child(2){animation-delay:.04s}
  .player-card:nth-child(3){animation-delay:.06s}.player-card:nth-child(4){animation-delay:.08s}
  .player-card:nth-child(5){animation-delay:.10s}.player-card:nth-child(6){animation-delay:.12s}
</style>
</head>
<body>
<div class="header">
  <div class="logo">GET HELP!</div>
  <select class="season-select" id="seasonSelect">
    <option value="13">S13</option><option value="12">S12</option><option value="11">S11</option>
    <option value="10">S10</option><option value="9">S9</option><option value="8">S8</option>
  </select>
</div>

<div class="main">
  <!-- Photo reference -->
  <div class="photo-ref" id="photoRef">
    <img id="photoImg" src="" alt="Enemy team">
    <div class="photo-actions">
      <label class="photo-btn" for="cameraInput" title="Retake">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
        </svg>
      </label>
      <button class="photo-btn" onclick="$('photoRef').classList.remove('active')" title="Hide">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Snap button (shown when no photo) -->
  <label class="snap-btn" id="snapBtn" for="cameraInput">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
    </svg>
    Snap enemy team for reference
  </label>
  <input type="file" id="cameraInput" accept="image/*" style="display:none">

  <!-- Name input - always visible and ready -->
  <div class="input-area">
    <input class="name-input" id="nameInput" type="text" placeholder="Type player name..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="add-btn" id="addBtn">ADD</button>
  </div>

  <!-- Player list -->
  <div class="players-section" id="playersSection" style="display:none">
    <div class="players-header">
      <span class="players-title">Enemy Team</span>
      <button class="clear-all" id="clearAll">Clear</button>
    </div>
    <div class="player-list" id="playerList"></div>
    <button class="lookup-all-btn" id="lookupAllBtn">OPEN ALL IN TRACKER.GG</button>
  </div>

  <div class="tip">
    <strong>Speed tip:</strong> Snap a photo of the loading screen, then read and type each name. Hit ADD or Enter after each one. Tap the arrow to check any player on tracker.gg.
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TRACKER_BASE = 'https://tracker.gg/marvel-rivals/profile/ign/';
let players = [];
let currentSeason = '13';
let editingIndex = -1;
const $ = id => document.getElementById(id);

$('seasonSelect').addEventListener('change', e => { currentSeason = e.target.value; renderPlayers(); });

// Photo handling
$('cameraInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    $('photoImg').src = ev.target.result;
    $('photoRef').classList.add('active');
    $('snapBtn').classList.add('has-photo');
    $('snapBtn').innerHTML = '<svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Retake photo';
    $('nameInput').focus();
  };
  reader.readAsDataURL(file);
});

// Add player
function addPlayer(name) {
  name = name.trim();
  if (!name) return;
  if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) { showToast('Already added'); return; }
  players.push({ name });
  renderPlayers();
  $('nameInput').value = '';
  $('nameInput').focus();
  showToast('Added ' + name);
}

$('addBtn').addEventListener('click', () => addPlayer($('nameInput').value));
$('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer($('nameInput').value); });

window.removePlayer = i => { players.splice(i, 1); editingIndex = -1; renderPlayers(); };
window.startEdit = i => { editingIndex = i; renderPlayers(); const el = $('edit-input-' + i); if (el) { el.focus(); el.select(); } };
window.confirmEdit = i => { const el = $('edit-input-' + i); if (el && el.value.trim()) { players[i].name = el.value.trim(); } editingIndex = -1; renderPlayers(); };

function getTrackerUrl(name) { return TRACKER_BASE + encodeURIComponent(name) + '/overview?season=' + currentSeason; }

function renderPlayers() {
  if (players.length === 0) {
    $('playersSection').style.display = 'none';
    $('lookupAllBtn').classList.remove('visible');
    return;
  }
  $('playersSection').style.display = 'block';
  $('lookupAllBtn').classList.add('visible');

  $('playerList').innerHTML = players.map((p, i) => {
    const editing = editingIndex === i;
    return `
    <div class="player-card" style="animation-delay:${i*0.02}s">
      <span class="player-index">${i+1}</span>
      <div class="player-info">
        ${editing
          ? `<input class="player-name-edit" id="edit-input-${i}" value="${esc(p.name)}" onkeydown="if(event.key==='Enter')confirmEdit(${i})" onblur="confirmEdit(${i})">`
          : `<div class="player-name">${html(p.name)}</div><div class="player-meta">S${currentSeason} -- tracker.gg</div>`}
      </div>
      <div class="player-actions">${editing ? '' : `
        <button class="player-btn btn-edit" onclick="startEdit(${i})"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="player-btn btn-remove" onclick="removePlayer(${i})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        <a href="${getTrackerUrl(p.name)}" target="_blank" rel="noopener" class="player-btn btn-open"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></a>
      `}</div>
    </div>`;
  }).join('');
}

$('clearAll').addEventListener('click', () => { players = []; editingIndex = -1; renderPlayers(); showToast('Cleared'); });
$('lookupAllBtn').addEventListener('click', () => {
  if (!players.length) return;
  players.forEach((p, i) => setTimeout(() => window.open(getTrackerUrl(p.name), '_blank'), i * 300));
  showToast('Opening ' + players.length + ' profiles...');
});

function html(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('visible');
  clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('visible'), 1800);
}
</script>
</body>
</html>
